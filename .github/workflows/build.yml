name: Desktop Build

on:
  pull_request:
  push:

jobs:
  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
    - run: flutter pub get
    - run: flutter build macos --release

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.1'
    - name: Install Inno Setup
      shell: pwsh
      run: |
        if (-not (Test-Path 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe') -and -not (Test-Path 'C:\Program Files\Inno Setup 6\ISCC.exe')) {
          choco install innosetup --no-progress -y
        }
    - run: flutter pub get
    - shell: pwsh
      run: ./scripts/package_windows_release.ps1 -FlutterBin flutter
